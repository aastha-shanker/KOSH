<!DOCTYPE html>
<html>
<head>
  <title>Kosh - Analytics</title>
  <link rel="stylesheet" href="analytics.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kavoon&display=swap" rel="stylesheet">
<link rel="icon" href="chest.png  " type="image/png" sizes="32x32">


  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="navbar" style="position: sticky; top: 0;">
    <h1>KOSH 💰</h1>
    <a href="index.html" class="back-btn">⬅ Back</a>
  </div>

<div class="header">
  <h1>📊 Analytics Zone</h1>
  <p class="tagline">“Numbers don’t lie… but they WILL expose you.”</p>
</div>

<div class="container">

  
  <div class="summary-container">

  <div class="summary-card">
    <h3>Total 💰</h3>
    <p id="totalCard">₹0</p>
  </div>

  <div class="summary-card">
    <h3>Average 📊</h3>
    <p id="avgCard">₹0</p>
  </div>

  <div class="summary-card">
    <h3>Top Category 🏆</h3>
    <p id="topCategory">None</p>
  </div>

</div>

  <div class="charts-container">
  
 <div class="chart-box">
  <h3>Category Breakdown 🥧</h3>
  <div class="chart-wrapper">
    <canvas id="pieChart"></canvas>
  </div>
</div>

<div class="chart-box">
  <h3>Daily Spending 📈</h3>
  <div class="chart-wrapper">
    <canvas id="barChart"></canvas>
  </div>
</div>

</div>

  <div id="insight" class="insight-box"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="analytics.js"></script>

</body>
</html>
